services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Optional: forward env values as build-args to override .env.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SERVICE_AUTH_ORIGIN: ${VITE_SERVICE_AUTH_ORIGIN}
        VITE_SERVICE_APP_ORIGIN: ${VITE_SERVICE_APP_ORIGIN}
        VITE_SERVICE_MARKETING_ORIGIN: ${VITE_SERVICE_MARKETING_ORIGIN}
        VITE_AFTER_LOGIN_URL: ${VITE_AFTER_LOGIN_URL}
        VITE_AFTER_LOGOUT_URL: ${VITE_AFTER_LOGOUT_URL}
        VITE_ABOUT_URL: ${VITE_ABOUT_URL}
        VITE_TERMS_URL: ${VITE_TERMS_URL}
        VITE_PRIVACY_URL: ${VITE_PRIVACY_URL}
        VITE_AUTH_TOKENS_MODE: ${VITE_AUTH_TOKENS_MODE}
        VITE_ALLOWED_ORIGINS: ${VITE_ALLOWED_ORIGINS}
        VITE_APP_NAME: ${VITE_APP_NAME}
    ports:
      - "8080:80"
