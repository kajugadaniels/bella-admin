<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Force light UI for form controls / scrollbars across browsers -->
    <meta name="color-scheme" content="light" />
    <!-- Set browser UI color on mobile -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Performance: preconnect Google Fonts (same as auth) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Bella - Admin</title>

    <!-- Hard set light mode before any paint -->
    <script>
      (function () {
        var d = document.documentElement;
        // Ensure any `dark` class (from OS or extensions) is stripped
        d.setAttribute("data-theme", "light");
        d.classList.remove("dark");
        // Prevent flash on Safari when it tries to honor prefers-color-scheme
        var s = document.createElement("style");
        s.innerHTML = "html{color-scheme:light;background:#fff}";
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
