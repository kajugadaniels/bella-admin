services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"   # Vite dev server
    env_file:
      - .env          # use your dev env values
    volumes:
      - .:/app:cached
      - node_modules:/app/node_modules
    # Speeds up file watching on some OSes
    environment:
      - CHOKIDAR_USEPOLLING=true
volumes:
  node_modules:
